    <script>
      // box 鼠标悬停
      const lisa = document.querySelectorAll(".content li a");
      // 绑定事件
      console.log(lisa, "ss");
      lisa.forEach((item) => {
        const img = item.querySelector("img");
        const em = item.querySelector("em");
        item.addEventListener("mouseenter", () => {
          img.className = "contentBoxImg";
        });
        item.addEventListener("mouseleave", () => {
          img.className = "contentBoxImgRemove";
        });
        item.addEventListener("mouseenter", () => {
          em.className = "mask";
        });
        item.addEventListener("mouseleave", () => {
          em.className = "removeMask";
        });
      });
    </script>
