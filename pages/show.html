    <script>
        // 获取id 和 type 和照片数量
        const infoArr = location.search.slice(1).split('&')
        const id = infoArr[0].split('=')[1]
        const type = infoArr[1].split('=')[1]
        const count = infoArr[2].split('=')[1]

      const listArr = [];
      for(let i = 0 ; i < count ; i++){
        listArr.push({
          id: "weddingIndoor8",
          text: "外景/光影",
          type,
        },)
      }
      console.log(listArr,'listArr')
      // 渲染
      const parentNode = document.querySelector(".sjs-default");
      let nodeStr = "";
      listArr.forEach((item, index) => {
        nodeStr += ` <div data-sjsel="flatty">
                <div class="card">
                  <img
                    class="card__picture"
                    src="../assets/imgs/wedding/${item.type}/${id}-${index + 1}.jpg"
                    alt=""
                  />
                </div>
              </div>`;
      });
      parentNode.innerHTML = nodeStr;
      document.querySelector("#sortable").sortablejs();
    </script>
